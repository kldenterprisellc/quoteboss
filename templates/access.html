<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuoteBoss - Enter License Key</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0B1F3A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1rem;
    }
    .gate-card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo { font-size: 2rem; font-weight: 800; color: #0B1F3A; margin-bottom: 0.25rem; }
    .logo span { color: #FF6B00; }
    .tagline { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    h2 { font-size: 1.3rem; color: #0B1F3A; margin-bottom: 0.5rem; }
    p { color: #555; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #FF6B00; }
    button {
      width: 100%;
      padding: 0.9rem;
      background: #FF6B00;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #e53935; font-size: 0.85rem; margin-top: 0.75rem; display: none; }
    .buy-link {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #888;
    }
    .buy-link a { color: #FF6B00; text-decoration: none; font-weight: 600; }
    .buy-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="gate-card">
    <div class="logo">Quote<span>Boss</span></div>
    <div class="tagline">Professional quotes for contractors</div>

    <h2>Enter Your License Key</h2>
    <p>You can find your license key in your Whop account after purchase.</p>

    <input type="text" id="license-input" placeholder="Paste your license key here..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="access-btn" onclick="verifyKey()">Access QuoteBoss</button>
    <div class="error" id="error-msg"></div>

    <div class="buy-link">
      Don't have a license? <a href="https://whop.com/web-growth-systems" target="_blank">Get QuoteBoss</a>
    </div>
  </div>

  <script>
    async function verifyKey() {
      const key = document.getElementById('license-input').value.trim();
      const btn = document.getElementById('access-btn');
      const err = document.getElementById('error-msg');

      if (!key) { showError('Please enter your license key'); return; }

      btn.disabled = true;
      btn.textContent = 'Verifying...';
      err.style.display = 'none';

      try {
        const res = await fetch('/api/verify-license', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ license_key: key })
        });
        const data = await res.json();

        if (data.success) {
          btn.textContent = 'Access Granted!';
          window.location.href = '/';
        } else {
          showError(data.error || 'Invalid license key');
          btn.disabled = false;
          btn.textContent = 'Access QuoteBoss';
        }
      } catch(e) {
        showError('Connection error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Access QuoteBoss';
      }
    }

    function showError(msg) {
      const err = document.getElementById('error-msg');
      err.textContent = msg;
      err.style.display = 'block';
    }

    document.getElementById('license-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') verifyKey();
    });
  </script>
</body>
</html>
